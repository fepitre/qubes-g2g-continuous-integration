---
- name: Compute docker runners on this host
  ansible.builtin.set_fact:
    _docker_runners: "{{ ci_runners | selectattr('host', 'equalto', inventory_hostname) | selectattr('executor', 'equalto', 'docker') | list }}"

- name: Check docker binary is present
  ansible.builtin.command: docker version --format '{% raw %}{{.Server.Version}}{% endraw %}'
  register: _docker_version
  changed_when: false
  failed_when: _docker_version.rc != 0

# TODO: loop device pre-allocation. Bleuet currently relies on a fixed set of
# /dev/loopN devices passed through to the container plus cap_add=MKNOD. This
# is hacky (devices must exist on the host before docker can pass them); a
# better approach is needed (e.g. losetup-managed pool, dynamic allocation,
# or a different sandboxing strategy).

- name: Pre-pull docker images for runners
  ansible.builtin.command: "docker pull {{ item }}"
  loop: "{{ _docker_runners | map(attribute='docker') | map(attribute='image') | unique | list }}"
  when: host_docker_pull_images | bool
  changed_when: true
  become: true
