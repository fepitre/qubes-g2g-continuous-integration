---
- name: Compute docker runners on this host
  ansible.builtin.set_fact:
    _docker_runners: "{{ ci_runners | selectattr('host', 'equalto', inventory_hostname) | selectattr('executor', 'equalto', 'docker') | list }}"

- name: Install docker on Debian-family hosts
  ansible.builtin.include_tasks: install-debian.yml
  when: ansible_os_family == 'Debian'

- name: Check docker binary is present
  ansible.builtin.command: docker version --format '{% raw %}{{.Server.Version}}{% endraw %}'
  register: _docker_version
  changed_when: false
  failed_when: _docker_version.rc != 0
  become: true

- name: Collect docker images to pull (apply default when unset)
  ansible.builtin.set_fact:
    _docker_images_to_pull: "{{ (_docker_images_to_pull | default([])) + [item.docker.image | default(host_docker_default_image)] }}"
  loop: "{{ _docker_runners }}"
  loop_control:
    label: "{{ item.name }}"

- name: Pre-pull docker images for runners
  ansible.builtin.command: "docker pull {{ item }}"
  loop: "{{ _docker_images_to_pull | default([]) | unique | list }}"
  when: host_docker_pull_images | bool
  changed_when: true
  become: true
