---
- name: Install docker from zypper
  community.general.zypper:
    name: docker
    state: present
  become: true
  notify: Restart gitlab-runner

# docker (>=27 on openSUSE Tumbleweed) defaults to the iptables-legacy
# firewall backend and installs FORWARD policy=DROP plus DOCKER-USER /
# DOCKER-FORWARD chains. Non-docker forwarded traffic (libvirt virbr0 ->
# uplink for VM NAT) falls through both docker chains and hits the
# legacy DROP, which is terminal even though firewalld already uses
# nftables. Switching docker to the nftables backend makes it install
# its rules in the same subsystem firewalld uses, so libvirt's own
# guest_nat NAT path is no longer shadowed by an invisible legacy DROP.
- name: Ensure /etc/docker exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Configure docker to use the nftables firewall backend
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "firewall-backend": "nftables"
      }
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart docker

- name: Ensure docker service is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  become: true

- name: Add gitlab-runner user to docker group
  ansible.builtin.user:
    name: gitlab-runner
    groups: docker
    append: true
  become: true
  notify: Restart gitlab-runner

- name: Install apparmor userspace
  community.general.zypper:
    name:
      - apparmor-parser
      - apparmor-utils
    state: present
  become: true

- name: Install docker-default-mount apparmor profile
  ansible.builtin.copy:
    src: docker-default-mount
    dest: /etc/apparmor.d/docker-default-mount
    owner: root
    group: root
    mode: "0644"
  become: true
  register: _aa_profile

- name: Load docker-default-mount apparmor profile
  ansible.builtin.command: /usr/sbin/apparmor_parser -r -W /etc/apparmor.d/docker-default-mount
  become: true
  when: _aa_profile.changed
  changed_when: true
