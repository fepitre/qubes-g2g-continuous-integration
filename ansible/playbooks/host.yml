---
#
# Configure SSH-managed runner hosts (docker and/or kvm executors). Hosts
# are picked from ci_runners entries with executor != qubesos. Each host's
# inventory entry must already exist in the active inventory (e.g. via
# ci-infrastructure/inventory.yml) so connection details are resolved.
#

- name: Identify SSH-managed runner hosts
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Validate ci_runners
      ansible.builtin.assert:
        that:
          - ci_runners is sequence
          - ci_runners is not string
        fail_msg: "ci_runners must be a list (see ansible/group_vars/all.yml)"
      tags: always

    - name: Add SSH-managed runner hosts to dynamic group
      ansible.builtin.add_host:
        name: "{{ item }}"
        groups: ssh_runner_hosts
      loop: "{{ ci_runners | rejectattr('executor', 'equalto', 'qubesos') | map(attribute='host') | unique | list }}"
      loop_control:
        label: "{{ item }}"
      tags: always

- name: Configure runner hosts
  hosts: ssh_runner_hosts
  gather_facts: true
  # Imported by ci-infrastructure/playbooks/bleuet.yml where group_vars is
  # not auto-loaded; pull the qubes-g2g-continuous-integration defaults in
  # explicitly. qubesos.yml is intentionally not loaded here (this playbook
  # only configures non-qubesos runners on SSH-managed hosts).
  vars_files:
    - ../group_vars/all/common.yml
    - ../group_vars/all/kvm.yml
    - ../group_vars/all/docker.yml
  tasks:
    - name: Determine executor types needed on this host
      ansible.builtin.set_fact:
        _host_has_docker: "{{ (ci_runners | selectattr('host', 'equalto', inventory_hostname) | selectattr('executor', 'equalto', 'docker') | list | length) > 0 }}"
        _host_has_kvm: "{{ (ci_runners | selectattr('host', 'equalto', inventory_hostname) | selectattr('executor', 'equalto', 'kvm') | list | length) > 0 }}"
        _host_has_shell: "{{ (ci_runners | selectattr('host', 'equalto', inventory_hostname) | selectattr('executor', 'equalto', 'shell') | list | length) > 0 }}"
      tags: always

    - name: SUSE family bootstrap
      when: ansible_os_family == 'Suse'
      become: true
      tags: always
      block:
        - name: Ensure /etc/sudoers includes /etc/sudoers.d
          ansible.builtin.lineinfile:
            path: /etc/sudoers
            line: "@includedir /etc/sudoers.d"
            state: present
            validate: /usr/sbin/visudo -cf %s

        - name: Sane sudoers defaults (disable targetpw, NOPASSWD wheel)
          ansible.builtin.copy:
            dest: /etc/sudoers.d/00-local
            content: |
              Defaults !targetpw
              root ALL=(ALL:ALL) ALL
              %wheel ALL=(ALL:ALL) NOPASSWD: ALL
            owner: root
            group: root
            mode: "0440"
            validate: /usr/sbin/visudo -cf %s

        - name: Add GitLab Runner zypper repo
          community.general.zypper_repository:
            name: runner_gitlab-runner
            repo: https://packages.gitlab.com/runner/gitlab-runner/opensuse/42.3/$basearch
            auto_import_keys: true
            autorefresh: true
            state: present

        - name: Install gitlab-runner package
          community.general.zypper:
            name: gitlab-runner
            state: present

    - name: Keep NetworkManager out of libvirt and docker bridges
      # NM auto-adopts virbr* and docker* otherwise: when libvirt restarts
      # its default net, NM keeps the bridge interface alive and libvirt
      # then fails with "File exists" because virbr0 is still up.
      ansible.builtin.copy:
        dest: /etc/NetworkManager/conf.d/90-libvirt-docker-unmanaged.conf
        content: |
          [keyfile]
          unmanaged-devices=interface-name:virbr*;interface-name:vnet*;interface-name:docker*;interface-name:br-*
        owner: root
        group: root
        mode: "0644"
      become: true
      register: _nm_unmanaged
      tags: always

    - name: Reload NetworkManager so unmanaged-devices applies
      ansible.builtin.systemd:
        name: NetworkManager
        state: reloaded
      become: true
      when: _nm_unmanaged.changed
      tags: always

    - name: Set up docker executor
      ansible.builtin.include_role:
        name: host-docker
      when: _host_has_docker
      tags: [docker]

    - name: Set up kvm executor
      ansible.builtin.include_role:
        name: host-kvm
      when: _host_has_kvm
      tags: [kvm]

    - name: Allow gitlab-runner passwordless sudo for shell jobs
      ansible.builtin.copy:
        dest: /etc/sudoers.d/gitlab-runner
        content: "gitlab-runner ALL=(ALL) NOPASSWD:ALL\n"
        owner: root
        group: root
        mode: "0440"
        validate: /usr/sbin/visudo -cf %s
      become: true
      when: _host_has_shell
      tags: [shell]

    - name: Render gitlab-runner config.toml
      ansible.builtin.include_role:
        name: host-qubesos
      tags: [config]
