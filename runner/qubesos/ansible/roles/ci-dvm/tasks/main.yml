---
# bind-dirs: persist builds, cache, and docker image store across DVM restarts
- name: Create bind-dirs configuration directory
  ansible.builtin.file:
    path: "{{ bind_dirs_conf_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create backing directories under bind-dirs root
  ansible.builtin.file:
    path: "{{ bind_dirs_root }}{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ ci_dvm_bind_dirs }}"

- name: Write bind-dirs drop-in configuration for CI directories
  ansible.builtin.template:
    src: bind-dirs.conf.j2
    dest: "{{ bind_dirs_conf_dir }}/gitlab-ci.conf"
    owner: root
    group: root
    mode: "0644"

- name: Ensure rc.local exists and is executable
  ansible.builtin.file:
    path: "{{ rc_local_path }}"
    state: touch
    owner: root
    group: root
    mode: "0755"

# /var/lib/docker needs the loop device; remount with dev to allow it
- name: Remount /var/lib/docker with dev flag in rc.local
  ansible.builtin.lineinfile:
    path: "{{ rc_local_path }}"
    line: "mount /var/lib/docker -o dev,suid,remount 2>/dev/null || true"
    state: present

# qubes-builderv2 chroots under /builder need working device nodes for /dev/null
- name: Remount /builder with dev flag in rc.local
  ansible.builtin.lineinfile:
    path: "{{ rc_local_path }}"
    line: "mount /builder -o dev,suid,remount 2>/dev/null || true"
    state: present

- name: Disable SELinux enforcement in rc.local
  ansible.builtin.lineinfile:
    path: "{{ rc_local_path }}"
    line: "setenforce 0"
    state: present

# QubesExecutor RPC scripts: allow file transfers from runner admin into DVM
- name: Create /etc/qubes-rpc directory
  ansible.builtin.file:
    path: /etc/qubes-rpc
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install qubesbuilder.FileCopyIn RPC service
  ansible.builtin.copy:
    src: qubesbuilder.FileCopyIn
    dest: /etc/qubes-rpc/qubesbuilder.FileCopyIn
    owner: root
    group: root
    mode: "0755"

- name: Install qubesbuilder.FileCopyOut RPC service
  ansible.builtin.copy:
    src: qubesbuilder.FileCopyOut
    dest: /etc/qubes-rpc/qubesbuilder.FileCopyOut
    owner: root
    group: root
    mode: "0755"

- name: Create gitlab-runner builds directory with correct ownership
  ansible.builtin.file:
    path: /home/user/builds
    state: directory
    owner: user
    group: user
    mode: "0755"

- name: Create gitlab-runner cache directory with correct ownership
  ansible.builtin.file:
    path: /home/user/cache
    state: directory
    owner: user
    group: user
    mode: "0755"

# gitlab-runner binary is needed inside DVMs for artifact uploads
- name: Check if gitlab-runner binary is already installed
  ansible.builtin.stat:
    path: "{{ gitlab_runner_bin }}"
  register: _runner_bin_stat

- name: Download gitlab-runner binary (latest)
  ansible.builtin.get_url:
    url: "https://gitlab-runner-downloads.s3.amazonaws.com/latest/binaries/gitlab-runner-linux-amd64"
    dest: "{{ gitlab_runner_bin }}"
    mode: "0755"
    owner: root
    group: root
  when:
    - not _runner_bin_stat.stat.exists
    - gitlab_runner_version == "latest"

- name: Download gitlab-runner binary (pinned version)
  ansible.builtin.get_url:
    url: "https://gitlab-runner-downloads.s3.amazonaws.com/{{ gitlab_runner_version }}/binaries/gitlab-runner-linux-amd64"
    dest: "{{ gitlab_runner_bin }}"
    mode: "0755"
    owner: root
    group: root
  when:
    - not _runner_bin_stat.stat.exists
    - gitlab_runner_version != "latest"

# per-runner optional config: look up the runner that owns this DVM
- name: Find runner associated with this DVM
  ansible.builtin.set_fact:
    _dvm_runner: "{{ runner_admin_names | selectattr('dvm_name', 'defined') | selectattr('dvm_name', 'equalto', inventory_hostname) | first | default({}) }}"

- name: Write ~/.gitconfig for DVM user
  ansible.builtin.template:
    src: gitconfig.j2
    dest: /home/user/.gitconfig
    owner: user
    group: user
    mode: "0644"
  when: _dvm_runner.gitconfig is defined

- name: Write gpg-split-domain for DVM user
  ansible.builtin.copy:
    dest: /rw/config/gpg-split-domain
    content: "{{ _dvm_runner.gpg_vault }}\n"
    owner: user
    group: user
    mode: "0644"
  when: _dvm_runner.gpg_vault is defined

- name: Create ~/.ssh directory
  ansible.builtin.file:
    path: /home/user/.ssh
    state: directory
    owner: user
    group: user
    mode: "0700"
  when: _dvm_runner.ssh_private_key is defined

- name: Deploy SSH private key
  ansible.builtin.copy:
    dest: /home/user/.ssh/id_ed25519
    content: "{{ _dvm_runner.ssh_private_key }}"
    owner: user
    group: user
    mode: "0600"
  when: _dvm_runner.ssh_private_key is defined

- name: Scan and store GitHub host key
  ansible.builtin.shell: |
    ssh-keyscan github.com >> /home/user/.ssh/known_hosts
  become: false
  when: _dvm_runner.ssh_private_key is defined
